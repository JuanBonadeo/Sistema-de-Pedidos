<!DOCTYPE html><html lang="es" data-fonts="serif" style="--accent: oklch(0.62 0.18 35);"><head>


<meta charset="utf-8">
<title>Delivery App · Nonna Lucía</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&amp;family=Geist:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet">

<style>
  :root {
    --bg: oklch(0.985 0.008 75);
    --ink: oklch(0.22 0.015 60);
    --ink-2: oklch(0.45 0.015 60);
    --ink-3: oklch(0.62 0.012 60);
    --hairline: oklch(0.92 0.008 75);
    --hairline-2: oklch(0.86 0.01 70);
    --accent: oklch(0.62 0.18 35);
    --fresh: oklch(0.58 0.13 145);
    --sans: 'Geist', -apple-system, system-ui, sans-serif;
    --display: 'Instrument Serif', Georgia, serif;
  }
  [data-fonts="sans"] {
    --sans: 'Geist', -apple-system, system-ui, sans-serif;
    --display: 'Geist', -apple-system, system-ui, sans-serif;
  }
  [data-fonts="serif"] {
    --sans: 'Geist', -apple-system, system-ui, sans-serif;
    --display: 'Instrument Serif', Georgia, serif;
  }
  [data-fonts="editorial"] {
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
    --display: 'Fraunces', Georgia, serif;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: var(--sans);
    background: #E6E1D7;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  #stage {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: flex-start;
    padding: 40px;
    gap: 40px;
    overflow-x: auto;
  }

  .phone-slot {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .phone-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase;
    color: rgba(0,0,0,0.4); font-weight: 500;
  }

  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 20px; bottom: 20px; z-index: 1000;
    width: 280px; background: #fff;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 14px;
    padding: 14px;
    font-family: var(--sans); color: var(--ink);
    display: none;
  }
  .tweaks-panel.on { display: block; }
  .tweak-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--ink-3);
    margin-bottom: 6px; margin-top: 10px;
  }
  .tweak-label:first-child { margin-top: 0; }
  .tweak-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweak-btn {
    flex: 1 1 auto; min-width: 60px;
    padding: 7px 10px; font-size: 12px;
    border: 1px solid rgba(0,0,0,0.12); background: #fff;
    border-radius: 8px; cursor: pointer; font-family: inherit;
    color: var(--ink); font-weight: 500;
  }
  .tweak-btn.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  .color-swatch {
    width: 28px; height: 28px; border-radius: 99px;
    border: 2px solid transparent; cursor: pointer;
    padding: 0; outline: 2px solid rgba(0,0,0,0.08); outline-offset: -4px;
  }
  .color-swatch.on { border-color: var(--ink); }

  body::-webkit-scrollbar, #stage::-webkit-scrollbar { height: 8px; }
  #stage::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 99px; }

  /* Every screen wrapper must fill the iOS frame */
  [data-screen-label] { height: 100%; width: 100%; }

  /* scrollbars inside phone */
  .phone-slot ::-webkit-scrollbar { width: 0; display: none; }
</style>
<body data-cc-id="cc-1" style="cursor: crosshair; background-color: rgb(255, 255, 255);">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx" data-plugins="transform-react-jsx-source" data-filename="ios-frame.jsx"></script>
<script type="text/babel" src="icons.jsx" data-plugins="transform-react-jsx-source" data-filename="icons.jsx"></script>
<script type="text/babel" src="data.jsx" data-plugins="transform-react-jsx-source" data-filename="data.jsx"></script>
<script type="text/babel" src="screens.jsx" data-plugins="transform-react-jsx-source" data-filename="screens.jsx"></script>
<script type="text/babel" src="screens-extra.jsx" data-plugins="transform-react-jsx-source" data-filename="screens-extra.jsx"></script>

<script>
// Tweakable defaults — editable via Tweaks panel
const TWEAKS = /*EDITMODE-BEGIN*/{
  "navVariant": "tabs",
  "fontPairing": "serif",
  "accent": "warm",
  "startScreen": "home",
  "loggedIn": true
}/*EDITMODE-END*/;
</script>

<script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline-5">
const { useState, useEffect, useRef } = React;

const ACCENTS = {
  warm:    { accent: 'oklch(0.62 0.18 35)',  label: 'Calor' },
  crimson: { accent: 'oklch(0.52 0.21 22)',  label: 'Carmín' },
  forest:  { accent: 'oklch(0.48 0.12 150)', label: 'Bosque' },
  ink:     { accent: 'oklch(0.22 0.015 60)', label: 'Tinta' },
  cobalt:  { accent: 'oklch(0.50 0.18 255)', label: 'Cobalto' },
};

function Phone({ children, label }) {
  return (
    <div className="phone-slot">
      <IOSDevice width={390} height={844}>{children}</IOSDevice>
      <div className="phone-label">{label}</div>
    </div>
  );
}

function App() {
  const [navVariant, setNavVariant] = useState(TWEAKS.navVariant);
  const [fontPairing, setFontPairing] = useState(TWEAKS.fontPairing);
  const [accentKey, setAccentKey] = useState(TWEAKS.accent);
  const [loggedIn, setLoggedIn] = useState(TWEAKS.loggedIn);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const auth = {
    loggedIn,
    user: { firstName: 'Matías', initials: 'M' },
  };

  // Shared cart state
  const TENANT = TENANTS['nonna-lucia'];
  const CLOSED_TENANT = TENANTS['tostado-cafe'];

  const loadCart = () => {
    try {
      const raw = localStorage.getItem('delivery-cart-v1');
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  };
  const seedCart = {
    p1: { id: 'p1', name: 'Sorrentinos de jamón crudo', unitPrice: 9800, qty: 2, selections: { salsa: 'fileto', queso: 'si', extras: [] }, tone: '#D9C9A8' },
    p4: { id: 'p4', name: 'Ravioles de ricota', unitPrice: 7900, qty: 1, selections: { salsa: 'crema', queso: 'si', extras: [] }, tone: '#D4C29A' },
    p12: { id: 'p12', name: 'Limonada de jengibre', unitPrice: 3200, qty: 1, selections: {}, tone: '#E8E0C8' },
  };

  const [cart, setCart] = useState(() => loadCart() || seedCart);
  const [activeScreen, setActiveScreen] = useState(TWEAKS.startScreen || 'home');
  const [openProduct, setOpenProduct] = useState(null);

  useEffect(() => {
    try { localStorage.setItem('delivery-cart-v1', JSON.stringify(cart)); } catch {}
  }, [cart]);

  // Apply accent + font to document
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', ACCENTS[accentKey].accent);
    document.documentElement.setAttribute('data-fonts', fontPairing);
  }, [accentKey, fontPairing]);

  const addToCart = (it) => {
    setCart(prev => ({ ...prev, [it.id]: { ...prev[it.id], ...it, qty: (prev[it.id]?.qty && prev[it.id]?.id === it.id ? 0 : 0) + it.qty } }));
    setOpenProduct(null);
  };
  const changeQty = (id, qty) => {
    setCart(prev => {
      const next = { ...prev };
      if (qty <= 0) delete next[id];
      else next[id] = { ...next[id], qty };
      return next;
    });
  };

  // Tweaks protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const persist = (patch) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  // 5 phone slots
  const slots = [
    { key: 'home', label: '01 · Home / Menú' },
    { key: 'sheet', label: '02 · Bottom Sheet' },
    { key: 'cart', label: '03 · Carrito' },
    { key: 'checkout', label: '04 · Checkout' },
    { key: 'tracking', label: '05 · Seguimiento' },
    { key: 'empty', label: '06 · Carrito vacío' },
    { key: 'closed', label: '07 · Local cerrado' },
  ];

  // Canned product for sheet demo
  const sheetProduct = TENANT.products.find(p => p.id === 'p2');

  const emptyCart = {};

  const handleAddFromSheet = (it) => {
    setCart(prev => ({ ...prev, [it.id]: it }));
  };

  return (
    <>
      <div id="stage">
        {/* 1. Home */}
        <Phone label="01 · Home / Menú">
          <div data-screen-label="01 Home">
            <HomeScreen tenant={TENANT} cart={cart}
              onOpenProduct={() => {}}
              onOpenCart={() => {}}
              onBack={() => {}}
              auth={auth} onAuthClick={() => setLoggedIn(v => !v)}
              navVariant={navVariant}/>
          </div>
        </Phone>

        {/* 2. Bottom sheet (home with overlay) */}
        <Phone label="02 · Producto · Bottom Sheet">
          <div data-screen-label="02 Product Sheet" style={{ position: 'relative', width: '100%', height: '100%' }}>
            <HomeScreen tenant={TENANT} cart={cart}
              onOpenProduct={() => {}}
              onOpenCart={() => {}}
              onBack={() => {}}
              auth={auth} onAuthClick={() => {}}
              navVariant={navVariant}/>
            <ProductSheet product={sheetProduct} tenant={TENANT}
              onClose={() => {}}
              onAdd={handleAddFromSheet}/>
          </div>
        </Phone>

        {/* 3. Cart */}
        <Phone label="03 · Carrito">
          <div data-screen-label="03 Cart">
            <CartScreen tenant={TENANT} cart={cart}
              onChange={changeQty}
              onBack={() => {}}
              onCheckout={() => {}}/>
          </div>
        </Phone>

        {/* 4. Checkout */}
        <Phone label="04 · Checkout">
          <div data-screen-label="04 Checkout">
            <CheckoutScreen tenant={TENANT} cart={cart}
              onBack={() => {}}
              onPlace={() => {}}/>
          </div>
        </Phone>

        {/* 5. Tracking */}
        <Phone label="05 · Seguimiento">
          <div data-screen-label="05 Tracking">
            <TrackingScreen tenant={TENANT} cart={cart}
              onBack={() => {}}
              onHome={() => {}}/>
          </div>
        </Phone>

        {/* 6. Empty cart */}
        <Phone label="06 · Carrito vacío">
          <div data-screen-label="06 Empty Cart">
            <CartScreen tenant={TENANT} cart={emptyCart}
              onChange={() => {}}
              onBack={() => {}}
              onCheckout={() => {}}/>
          </div>
        </Phone>

        {/* 7. Closed restaurant */}
        <Phone label="07 · Local cerrado">
          <div data-screen-label="07 Closed Tenant">
            <HomeScreen tenant={TENANT_CLOSED} cart={{}}
              onOpenProduct={() => {}}
              onOpenCart={() => {}}
              onBack={() => {}}
              auth={auth} onAuthClick={() => {}}
              navVariant={navVariant}/>
          </div>
        </Phone>

        {/* 8. Profile */}
        <Phone label="08 · Perfil">
          <div data-screen-label="08 Profile">
            <ProfileScreen
              user={{ firstName: 'Matías', lastName: 'Álvarez',
                email: 'matias.alvarez@mail.com' }}
              onBack={() => {}}
              onLogout={() => { setLoggedIn(false); persist({ loggedIn: false }); }}/>
          </div>
        </Phone>

        {/* 9. Login */}
        <Phone label="09 · Ingresar">
          <div data-screen-label="09 Login">
            <LoginScreen
              onBack={() => {}}
              onLogin={() => { setLoggedIn(true); persist({ loggedIn: true }); }}/>
          </div>
        </Phone>
      </div>

      {/* Tweaks panel */}
      <div className={'tweaks-panel' + (tweaksOpen ? ' on' : '')}>
        <div style={{
          fontFamily: 'var(--display)', fontSize: 18, marginBottom: 12,
          letterSpacing: -0.3,
        }}>Tweaks</div>

        <div className="tweak-label">Navegación de categorías</div>
        <div className="tweak-row">
          {['tabs', 'chips', 'segmented'].map(v => (
            <button key={v}
              className={'tweak-btn' + (navVariant === v ? ' on' : '')}
              onClick={() => { setNavVariant(v); persist({ navVariant: v }); }}>
              {v === 'tabs' ? 'Tabs' : v === 'chips' ? 'Chips' : 'Segmented'}
            </button>
          ))}
        </div>

        <div className="tweak-label">Tipografía</div>
        <div className="tweak-row">
          {[
            { id: 'sans', label: 'Sans' },
            { id: 'serif', label: 'Serif' },
            { id: 'editorial', label: 'Editorial' },
          ].map(o => (
            <button key={o.id}
              className={'tweak-btn' + (fontPairing === o.id ? ' on' : '')}
              onClick={() => { setFontPairing(o.id); persist({ fontPairing: o.id }); }}>
              {o.label}
            </button>
          ))}
        </div>

        <div className="tweak-label">Sesión</div>
        <div className="tweak-row">
          <button className={'tweak-btn' + (!loggedIn ? ' on' : '')}
            onClick={() => { setLoggedIn(false); persist({ loggedIn: false }); }}>Ingresar</button>
          <button className={'tweak-btn' + (loggedIn ? ' on' : '')}
            onClick={() => { setLoggedIn(true); persist({ loggedIn: true }); }}>Logueado</button>
        </div>

        <div className="tweak-label">Color de acento</div>
        <div className="tweak-row">
          {Object.entries(ACCENTS).map(([k, v]) => (
            <button key={k}
              className={'color-swatch' + (accentKey === k ? ' on' : '')}
              title={v.label}
              onClick={() => { setAccentKey(k); persist({ accent: k }); }}
              style={{ background: v.accent }}/>
          ))}
        </div>

        <div className="tweak-label">Reset</div>
        <div className="tweak-row">
          <button className="tweak-btn" onClick={() => {
            localStorage.removeItem('delivery-cart-v1');
            setCart(seedCart);
          }}>Restaurar carrito</button>
        </div>
      </div>
    </>
  );
}

// make closed tenant available
const TENANT_CLOSED = (() => {
  const t = JSON.parse(JSON.stringify(TENANTS['nonna-lucia']));
  t.status = 'closed';
  t.hours = 'Abre mañana a las 12:00';
  return t;
})();
window.TENANT_CLOSED = TENANT_CLOSED;

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>


</body></html>

<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Kinetic Curator - Margherita Bottom Sheet</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-container": "#eefff7",
                      "on-primary-container": "#fffaf9",
                      "outline-variant": "#e5bdbe",
                      "primary-fixed": "#ffdada",
                      "error-container": "#ffdad6",
                      "tertiary-container": "#00836c",
                      "on-surface-variant": "#5c3f40",
                      "surface-dim": "#d2d9f4",
                      "surface-tint": "#be0037",
                      "surface-bright": "#faf8ff",
                      "background": "#faf8ff",
                      "inverse-primary": "#ffb3b6",
                      "primary-container": "#e11d48",
                      "secondary-container": "#fd7681",
                      "on-tertiary-fixed": "#002019",
                      "on-primary-fixed-variant": "#920028",
                      "primary": "#b80035",
                      "on-primary-fixed": "#40000c",
                      "secondary-fixed-dim": "#ffb3b6",
                      "secondary-fixed": "#ffdada",
                      "tertiary-fixed": "#90f5d9",
                      "on-secondary-container": "#710920",
                      "on-secondary-fixed-variant": "#871d2e",
                      "on-surface": "#131b2e",
                      "inverse-on-surface": "#eef0ff",
                      "error": "#ba1a1a",
                      "on-background": "#131b2e",
                      "surface-container-lowest": "#ffffff",
                      "on-secondary": "#ffffff",
                      "surface-container-low": "#f2f3ff",
                      "on-tertiary-fixed-variant": "#005142",
                      "surface": "#faf8ff",
                      "on-tertiary": "#ffffff",
                      "surface-container-highest": "#dae2fd",
                      "on-error": "#ffffff",
                      "on-secondary-fixed": "#40000c",
                      "on-primary": "#ffffff",
                      "primary-fixed-dim": "#ffb3b6",
                      "tertiary-fixed-dim": "#74d8bd",
                      "outline": "#906f70",
                      "on-error-container": "#93000a",
                      "inverse-surface": "#283044",
                      "secondary": "#a83544",
                      "surface-container-high": "#e2e7ff",
                      "surface-container": "#eaedff",
                      "tertiary": "#006855",
                      "surface-variant": "#dae2fd"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Inter"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            }
          }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: rgba(19, 27, 46, 0.4); } /* Simulate backdrop */
        .bottom-sheet {
            box-shadow: 0 -8px 32px rgba(19, 27, 46, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-end justify-center min-h-screen text-on-surface antialiased p-4 md:p-8">
<!-- Bottom Sheet Container -->
<main class="bottom-sheet bg-surface w-full max-w-2xl rounded-t-[1.5rem] md:rounded-[1.5rem] overflow-hidden flex flex-col relative max-h-[795px] shadow-2xl transition-transform duration-300 transform translate-y-0">
<!-- Drag Handle (Mobile) -->
<div class="w-full flex justify-center pt-3 pb-2 md:hidden absolute top-0 z-20">
<div class="w-12 h-1.5 bg-outline-variant/40 rounded-full"></div>
</div>
<!-- Close Button -->
<button class="absolute top-4 right-4 z-20 w-10 h-10 bg-surface-container-highest/80 backdrop-blur-md rounded-full flex items-center justify-center text-on-surface hover:bg-surface-container-highest transition-colors shadow-sm">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">close</span>
</button>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto pb-[120px]">
<!-- Header Photo -->
<div class="w-full h-[265px] min-h-[240px] relative bg-surface-container-low">
<img alt="Margherita Pizza" class="w-full h-full object-cover rounded-t-[1.5rem] md:rounded-t-[1.5rem]" data-alt="Close up overhead shot of a rustic neapolitan margherita pizza with blistered crust, melted fresh mozzarella, bright red tomato sauce, and fresh basil leaves on a dark slate table with dramatic natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvGVcmG_KL7rTDsVCwA3GfIBcl1gb6rqL8fySGgC2zRYxQ5ef2_siUvzdU-4CeziLMWVyoTcypKOeuMyDzzEXzdeC3ujSPzr_SAAdqRm289qbOUxbBikfPFII736XhwuveIF-bieXdzBFe_thx3qOcjYxeWCijVDn7WWlQPtt_LqSF8V5rBTrw6z6DyU7bvk-cSqsadp09QK55hoKxIR8f-Zzm-F14sxNbqpFKY-gPBU1lA9DY8DmlDajV1eW9N0HCRiNvq0n_TWo"/>
</div>
<div class="px-6 py-8">
<!-- Title & Description -->
<div class="mb-10">
<h1 class="font-headline text-[2rem] font-extrabold tracking-tight text-on-surface mb-3 leading-tight">Margherita</h1>
<p class="font-body text-[0.875rem] leading-relaxed text-on-surface/80">Salsa de tomate, mozzarella y albahaca fresca.</p>
</div>
<!-- Modifiers: Elegí tamaño (Radio) -->
<section class="mb-10">
<div class="flex justify-between items-baseline mb-4">
<h2 class="font-headline text-[1.375rem] font-bold tracking-tight">Elegí tamaño</h2>
<span class="font-label text-[0.6875rem] uppercase tracking-widest text-primary font-bold bg-primary-container/20 px-2 py-1 rounded">Obligatorio</span>
</div>
<div class="bg-surface-container-low rounded-xl p-2 flex flex-col gap-1">
<!-- Radio Item 1 -->
<label class="flex items-center justify-between p-4 cursor-pointer rounded-lg hover:bg-surface-container transition-colors min-h-[44px]">
<div class="flex items-center gap-4">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary bg-surface-container-lowest" name="size" type="radio" value="chica"/>
<span class="font-body text-[1rem] font-medium">Chica</span>
</div>
</label>
<!-- Radio Item 2 -->
<label class="flex items-center justify-between p-4 cursor-pointer rounded-lg hover:bg-surface-container transition-colors min-h-[44px]">
<div class="flex items-center gap-4">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary bg-surface-container-lowest" name="size" type="radio" value="grande"/>
<span class="font-body text-[1rem] font-medium">Grande</span>
</div>
<span class="font-body text-[0.875rem] text-on-surface/70">+$1.200</span>
</label>
</div>
</section>
<!-- Modifiers: Extras (Checkbox) -->
<section class="mb-10">
<div class="flex justify-between items-baseline mb-4">
<h2 class="font-headline text-[1.375rem] font-bold tracking-tight">Extras</h2>
<span class="font-label text-[0.6875rem] uppercase tracking-widest text-on-surface/60 font-bold">Opcional</span>
</div>
<div class="bg-surface-container-low rounded-xl p-2 flex flex-col gap-1">
<!-- Checkbox Item 1 -->
<label class="flex items-center justify-between p-4 cursor-pointer rounded-lg hover:bg-surface-container transition-colors min-h-[44px]">
<div class="flex items-center gap-4">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary rounded bg-surface-container-lowest" name="extra_ajo" type="checkbox"/>
<span class="font-body text-[1rem] font-medium">Ajo</span>
</div>
<span class="font-body text-[0.875rem] text-on-surface/70">+$200</span>
</label>
<!-- Checkbox Item 2 -->
<label class="flex items-center justify-between p-4 cursor-pointer rounded-lg hover:bg-surface-container transition-colors min-h-[44px]">
<div class="flex items-center gap-4">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary rounded bg-surface-container-lowest" name="extra_aceitunas" type="checkbox"/>
<span class="font-body text-[1rem] font-medium">Aceitunas</span>
</div>
<span class="font-body text-[0.875rem] text-on-surface/70">+$400</span>
</label>
<!-- Checkbox Item 3 -->
<label class="flex items-center justify-between p-4 cursor-pointer rounded-lg hover:bg-surface-container transition-colors min-h-[44px]">
<div class="flex items-center gap-4">
<input class="w-5 h-5 text-primary border-outline-variant focus:ring-primary rounded bg-surface-container-lowest" name="extra_parmesano" type="checkbox"/>
<span class="font-body text-[1rem] font-medium">Parmesano</span>
</div>
<span class="font-body text-[0.875rem] text-on-surface/70">+$600</span>
</label>
</div>
</section>
<!-- Notes Textarea -->
<section class="mb-8">
<h2 class="font-headline text-[1.375rem] font-bold tracking-tight mb-4">Aclaraciones</h2>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-4 font-body text-[0.875rem] focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none resize-none placeholder:text-on-surface/40 transition-shadow" placeholder="Instrucciones especiales para el local..." rows="3"></textarea>
</section>
</div>
</div>
<!-- Sticky Bottom Action Bar -->
<div class="absolute bottom-0 left-0 w-full bg-surface-container-highest/80 backdrop-blur-xl px-6 py-5 flex items-center justify-between gap-4 shadow-[0_-8px_32px_rgba(19,27,46,0.04)] z-30">
<!-- Stepper -->
<div class="flex items-center bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10">
<button class="w-[44px] h-[56px] flex items-center justify-center text-on-surface hover:bg-surface-container-low transition-colors rounded-l-xl active:scale-95">
<span class="material-symbols-outlined text-[1.25rem]">remove</span>
</button>
<span class="font-body text-[1rem] font-bold w-8 text-center">1</span>
<button class="w-[44px] h-[56px] flex items-center justify-center text-primary hover:bg-surface-container-low transition-colors rounded-r-xl active:scale-95">
<span class="material-symbols-outlined text-[1.25rem]">add</span>
</button>
</div>
<!-- Primary Action -->
<button class="flex-1 h-[56px] bg-primary text-on-primary rounded-xl font-headline font-bold text-[1rem] flex items-center justify-center gap-3 hover:opacity-90 active:scale-98 transition-all shadow-sm">
<span>Agregar</span>
<span class="text-on-primary/80 text-[0.875rem]">•</span>
<span>$4.200</span>
</button>
</div>
</main>
</body></html>
